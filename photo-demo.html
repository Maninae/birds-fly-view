<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>birds-fly-view · photo demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0a0a; font-family: system-ui, -apple-system, sans-serif; }
      canvas { display: block; }
      #hint {
        position: fixed; top: 12px; left: 12px; right: 12px; max-width: 560px;
        margin: 0 auto; padding: 14px 18px; background: rgba(0, 0, 0, 0.72);
        color: #f0e8d8; font-size: 14px; line-height: 1.45; border-radius: 8px;
        z-index: 10; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      }
      #hint code, #hint kbd {
        background: rgba(255, 255, 255, 0.08); padding: 1px 6px;
        border-radius: 4px; font-family: ui-monospace, SFMono-Regular, monospace;
      }
      #hint small { display: block; margin-top: 6px; opacity: 0.7; }
      #attrib {
        position: fixed; bottom: 8px; left: 12px; right: 12px;
        font-size: 11px; line-height: 1.4; color: rgba(255, 255, 255, 0.72);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6); z-index: 5;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="hint">Loading&hellip;</div>
    <div id="attrib"></div>
    <script type="module" src="/src/dev/photo-demo.ts"></script>
  </body>
</html>
