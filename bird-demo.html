<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>birds-fly-view — bird dev harness</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #F5E3C8;
      color: #2b2620;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    }
    #view {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    #hud {
      position: fixed;
      left: 12px;
      bottom: 10px;
      padding: 6px 10px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      background: rgba(255, 245, 224, 0.55);
      border-radius: 4px;
      pointer-events: none;
    }
    #hints {
      position: fixed;
      right: 12px;
      bottom: 10px;
      font-size: 11px;
      opacity: 0.75;
      background: rgba(255, 245, 224, 0.55);
      padding: 6px 10px;
      border-radius: 4px;
      pointer-events: none;
    }
    #prompt {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 60px;
      font-size: 14px;
      color: #2b2620;
      background: rgba(255, 245, 224, 0.85);
      padding: 6px 12px;
      border-radius: 20px;
      pointer-events: none;
    }
    #err {
      position: fixed;
      left: 12px;
      top: 12px;
      color: #7c1e1e;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="hud"></div>
  <div id="prompt"></div>
  <div id="hints">
    W/S · A/D · arrows &nbsp;·&nbsp; Space flap &nbsp;·&nbsp; Shift brake &nbsp;·&nbsp; E land / take off &nbsp;·&nbsp; V camera
  </div>
  <div id="err"></div>
  <script type="module" src="/src/dev/bird-demo.ts"></script>
</body>
</html>
